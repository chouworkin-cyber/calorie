<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - CalTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', 'Kanit', sans-serif;
            background: radial-gradient(circle, #f9f5f2 50%, #f7f1eb 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
        }
        .register-box {
            background: white; padding: 3rem; border-radius: 25px; width: 400px;
            box-shadow: 0 10px 30px rgba(139, 69, 19, 0.15); text-align: center;
        }
        h2 { color: #424242; margin-bottom: 20px; }
        input {
            width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #f7f1eb; border-radius: 12px; box-sizing: border-box;
        }
        .btn-reg {
            width: 100%; padding: 15px; background: #b7764a; color: white;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
        }
        .btn-reg:hover { background: #a36640; transform: translateY(-2px); }
        .error-msg { color: #d9534f; font-size: 0.85rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="register-box">
        <div style="background: #b7764a; width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; box-shadow: 0 10px 20px rgba(183,118,74,0.2);">
            <span style="font-weight: 800; font-size: 1.8rem; color: white;">SUT</span>
        </div>
        <h2>sign up</h2>
        <form action="/register" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-reg">sign up</button>
        </form>
        <div th:if="${param.error}" class="error-msg">Username already exists. Please try another one.</div>
        <a href="/" style="display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem;">Back to Login</a>
    </div>
</body>
</html>
