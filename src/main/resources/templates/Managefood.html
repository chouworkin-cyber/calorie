<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Food - HealthTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --orange: #b7764a; --orange-light: #d4956e; --cream: #f7f1eb; --success: #4caf7d; --danger: #e05c5c; --text-dark: #424242; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: 'Kanit', 'DM Sans', sans-serif; background: radial-gradient(circle, #f9f5f2 50%, #f7f1eb 100%); min-height: 100vh; display: flex; color: var(--text-dark); }

    
        .sidebar { width: 240px; background: #ffffff; min-height: 100vh; display: flex; flex-direction: column; border-right: 1px solid rgba(0,0,0,0.05); flex-shrink: 0; }
        .sidebar-brand { padding: 28px 24px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); text-align: center; }
        .sidebar-brand .brand-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--orange); }
        .sidebar-brand .brand-sub { font-size: 0.72rem; color: #666; margin-top: 3px; letter-spacing: 1.5px; text-transform: uppercase; }
        .sidebar-nav { flex: 1; padding: 20px 0; }
        .nav-section { padding: 8px 16px 4px; font-size: 0.65rem; color: #999; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: #888; text-decoration: none; font-size: 0.9rem; border-left: 3px solid transparent; transition: all 0.2s; }
        .nav-item:hover, .nav-item.active { color: var(--orange); background: rgba(183,118,74,0.05); border-left-color: var(--orange); }
        .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
        .sidebar-logo { width: 60px; height: auto; margin-bottom: 10px; }

        
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .topbar { background: rgba(255, 255, 255, 0.5); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(0,0,0,0.05); flex-shrink: 0; backdrop-filter: blur(10px); }
        .topbar-title { font-weight: 600; font-size: 1.4rem; color: var(--text-dark); }
        .content { padding: 32px; flex: 1; }

        .page-grid { display: grid; grid-template-columns: 380px 1fr; gap: 24px; align-items: start; }

        
        .card { background: #ffffff; border: 1px solid rgba(0,0,0,0.05); border-radius: 14px; overflow: hidden; box-shadow: 0 4px 15px rgba(139, 69, 19, 0.05); }
        .card-header { padding: 18px 22px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; }
        .card-title { font-size: 0.95rem; font-weight: 600; color: var(--text-dark); }
        .card-body { padding: 22px; }

        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        .form-input, .form-select { width: 100%; padding: 12px; background: #fcfaf8; border: 1px solid #eee; border-radius: 10px; color: var(--text-dark); font-family: 'Kanit', sans-serif; }
        .form-input:focus { outline: none; border-color: var(--orange); }
        
        .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        .btn-primary { width: 100%; padding: 14px; background: var(--orange); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: var(--orange-light); }
        .btn-secondary { background: #333; color: #ccc; }

        
        table { width: 100%; border-collapse: collapse; }
        thead th { text-align: left; padding: 12px 18px; font-size: 0.72rem; text-transform: uppercase; color: #999; border-bottom: 1px solid rgba(0,0,0,0.05); background: #fcfaf8; }
        tbody td { padding: 16px 18px; color: #666; border-bottom: 1px solid #f9f5f2; font-size: 0.88rem; }
        .food-name { font-weight: 600; color: var(--text-dark); }
        .category-tag { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; background: rgba(255,255,255,0.05); }

        .action-link { color: var(--orange); text-decoration: none; font-size: 0.8rem; margin-right: 10px; }
        .btn-del { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 0.8rem; }

        .alert { padding: 12px 18px; border-radius: 10px; margin-bottom: 20px; font-size: 0.88rem; background: rgba(76,175,125,0.15); color: var(--success); border: 1px solid rgba(76,175,125,0.05); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <div style="background: #fcfaf8; width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;">
            <span style="font-weight: 800; font-size: 2.5rem; color: #b7764a;">SUT</span>
        </div>
        <div class="brand-sub">Manager Console</div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Overview</div>
        <a href="/manager/home" class="nav-item"><span class="icon"></span> Dashboard</a>
        <div class="nav-section">Manage</div>
        <a href="/manager/food" class="nav-item active"><span class="icon"></span> Food Menu</a>
        <a href="/manager/workout" class="nav-item"><span class="icon"></span> Workout Plans</a>
        <a href="/manager/users" class="nav-item"><span class="icon"></span> Users</a>
    </nav>
</div>

<div class="main">
    <div class="topbar">
        <div class="topbar-title">Food Menu Manager</div>
        <div style="font-size: 0.85rem; color: #555;">System Status: <span style="color: var(--success);">Online</span></div>
    </div>

    <div class="content">
        <div th:if="${successMsg}" class="alert" th:text="${successMsg}"></div>

        <div class="page-grid">
            <!-- Form Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title" th:text="${editFood != null ? 'Edit Food Item' : 'Add New Food'}">Add Food</span>
                </div>
                <div class="card-body">
                    <form th:action="${editFood != null ? '/manager/food/update' : '/manager/food/add'}" method="post">
                        <input type="hidden" name="id" th:if="${editFood != null}" th:value="${editFood.id}">
                        
                        <div class="form-group">
                            <label class="form-label">Food Name</label>
                            <input type="text" name="name" class="form-input" required th:value="${editFood?.name}" placeholder="e.g. ข้าวมันไก่">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Calories (kcal)</label>
                            <input type="number" name="calories" class="form-input" required th:value="${editFood?.calories}">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select">
                                <option th:selected="${editFood?.category == 'Thai'}" value="Thai">Thai Food</option>
                                <option th:selected="${editFood?.category == 'japan'}" value="japan">Japanese Food</option>
                                <option th:selected="${editFood?.category == 'chinese'}" value="chinese">Chinese Food</option>
                                <option th:selected="${editFood?.category == 'Healthy'}" value="Healthy">Healthy</option>
                                <option th:selected="${editFood?.category == 'Snack'}" value="Snack">Snack/Drink</option>
                                <option th:selected="${editFood?.category == 'other'}" value="other">Other</option>
                            </select>
                        </div>

                        <div class="macro-grid">
                            <div class="form-group"><label class="form-label">Protein</label><input type="number" step="0.1" name="protein" class="form-input" th:value="${editFood?.protein}"></div>
                            <div class="form-group"><label class="form-label">Carbs</label><input type="number" step="0.1" name="carbs" class="form-input" th:value="${editFood?.carbs}"></div>
                            <div class="form-group"><label class="form-label">Fat</label><input type="number" step="0.1" name="fat" class="form-input" th:value="${editFood?.fat}"></div>
                        </div>
                        
                        <button type="submit" class="btn-primary" th:text="${editFood != null ? 'Update Food Item' : '+ Add food'}">Action</button>
                        <a th:if="${editFood != null}" href="/manager/food" style="display:block; text-align:center; margin-top:15px; color:#666; text-decoration:none; font-size:0.8rem;">Cancel Edit</a>
                    </form>
                </div>
            </div>

            <!-- Table Card -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Food</span>
                </div>
                <div class="card-body" style="padding: 0;">
                    <table>
                        <thead>
                            <tr>
                                <th>Food Item</th>
                                <th>Category</th>
                                <th>Calories</th>
                                <th>Macros (P/C/F)</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="f : ${foodItems}">
                                <td class="food-name" th:text="${f.name}">Name</td>
                                <td><span class="category-tag" th:text="${f.category}">Cat</span></td>
                                <td th:text="${f.calories + ' kcal'}">0</td>
                                <td style="font-size: 0.8rem; color: #666;" th:text="${f.protein + 'g / ' + f.carbs + 'g / ' + f.fat + 'g'}">Macros</td>
                                <td>
                                    <a th:href="@{/manager/food/edit(id=${f.id})}" class="action-link">Edit</a>
                                    <form th:action="@{/manager/food/delete}" method="post" style="display: inline;">
                                        <input type="hidden" name="id" th:value="${f.id}">
                                        <button type="submit" class="btn-del" onclick="return confirm('Delete this food?')">Delete</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
