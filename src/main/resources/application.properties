spring.application.name=demo

# Active Profile: สลับระหว่าง 'dev' (Mock) และ 'prod' (Real DB)
spring.profiles.active=dev

# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=calories_db;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=YourStrong!Passw0rd
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
server.port=8080

# JPA / Hibernate Configuration
# Enable SQL script initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# 'update' จะทำการตรวจสอบโครงสร้างตารางและอัปเดตให้ตรงกับ Entity ใน Java 
# โดยจะรักษาข้อมูลเดิมไว้เสมอ (ห้ามใช้ 'create' หรือ 'create-drop' เพราะข้อมูลจะถูกล้างใหม่ทุกครั้ง)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# เพิ่มการตั้งค่า Connection Pool เพื่อความเสถียรในการเชื่อมต่อฐานข้อมูล
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
