spring.application.name=demo

# Active Profile: สลับระหว่าง 'dev' (Mock) และ 'prod' (Real DB)
spring.profiles.active=dev

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/calories_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
server.port=8080

# JPA / Hibernate Configuration
# 'update' จะทำการตรวจสอบโครงสร้างตารางและอัปเดตให้ตรงกับ Entity ใน Java 
# โดยจะรักษาข้อมูลเดิมไว้เสมอ (ห้ามใช้ 'create' หรือ 'create-drop' เพราะข้อมูลจะถูกล้างใหม่ทุกครั้ง)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# เพิ่มการตั้งค่า Connection Pool เพื่อความเสถียรในการเชื่อมต่อฐานข้อมูล
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
